{{NAV}}

<main>

  <div class="contact-layout">
    <div class="contact-heading-col">
      <h1 class="contact-cta">CONTACT ME DIRECTLY &gt;</h1>
    </div>
    <div class="contact-form-col">
      <form class="contact-form" action="https://formspree.io/f/xpwrjgvk" method="POST">
        <div class="form-group">
          <label>Name</label>
          <div class="form-row">
            <div class="form-field">
              <label class="form-sublabel">First Name <span class="req">(required)</span></label>
              <input type="text" name="first_name" required />
            </div>
            <div class="form-field">
              <label class="form-sublabel">Last Name <span class="req">(required)</span></label>
              <input type="text" name="last_name" required />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-sublabel">Email <span class="req">(required)</span></label>
          <input type="email" name="email" required />
        </div>
        <div class="form-group">
          <label class="form-sublabel">Message <span class="req">(required)</span></label>
          <textarea name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send</button>
      </form>
    </div>
  </div>

</main>
